name: Release builds

# Builds the `ndtool` NDFS command-line tool (from ndfs-c) for Windows, Linux
# and macOS, and attaches the archives to a GitHub Release.
#
# Trigger:
#   * push a tag matching v*   -> build all targets AND publish a Release
#   * workflow_dispatch        -> build all targets as downloadable artifacts
#                                 (no Release is published)
#
# ndtool is a self-contained C99 binary with no external runtime dependencies,
# so each archive is just the binary + README.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  TOOL_NAME: ndtool
  # CMake project lives in the ndfs-c subdirectory.
  SRC_DIR: ndfs-c

jobs:
  # ── Compute a version string shared by every archive name ───────────
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="0.0.0-dev"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

  # ── Windows x64 (MinGW-w64 via MSYS2, static) ───────────────────────
  build-windows:
    name: Build windows-x64
    needs: version
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup MSYS2 (MINGW64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            zip
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      - name: Configure
        run: >-
          cmake -S "$SRC_DIR" -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_EXE_LINKER_FLAGS="-static"

      - name: Build
        run: cmake --build build --target ndtool

      - name: Stage archive
        run: |
          set -e
          STAGE="dist/${TOOL_NAME}-windows-x64"
          mkdir -p "$STAGE"
          cp build/ndtool.exe "$STAGE/"
          cp "$SRC_DIR/tools/ndtool/README.md" "$STAGE/" 2>/dev/null || true
          cp README.md LICENSE "$STAGE/" 2>/dev/null || true

      - name: Create zip
        run: |
          cd dist
          zip -r "${TOOL_NAME}-windows-x64.zip" "${TOOL_NAME}-windows-x64"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.TOOL_NAME }}-windows-x64
          path: dist/${{ env.TOOL_NAME }}-windows-x64.zip
          if-no-files-found: error

  # ── Linux (x64 + arm64, statically linked) ──────────────────────────
  build-linux:
    name: Build linux-${{ matrix.arch }}
    needs: version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build

      - name: Configure
        run: >-
          cmake -S "$SRC_DIR" -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_EXE_LINKER_FLAGS="-static"

      - name: Build
        run: cmake --build build --target ndtool

      - name: Stage archive
        run: |
          set -e
          STAGE="dist/${TOOL_NAME}-linux-${{ matrix.arch }}"
          mkdir -p "$STAGE"
          cp build/ndtool "$STAGE/"
          cp "$SRC_DIR/tools/ndtool/README.md" "$STAGE/" 2>/dev/null || true
          cp README.md LICENSE "$STAGE/" 2>/dev/null || true

      - name: Create tarball
        run: |
          cd dist
          tar czf "${TOOL_NAME}-linux-${{ matrix.arch }}.tar.gz" \
              "${TOOL_NAME}-linux-${{ matrix.arch }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.TOOL_NAME }}-linux-${{ matrix.arch }}
          path: dist/${{ env.TOOL_NAME }}-linux-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  # ── macOS (Apple Silicon + Intel) ───────────────────────────────────
  # macOS has no static libc; ndtool links only libSystem, which is always
  # present, so the dynamically linked binary is portable as-is.
  build-macos:
    name: Build macos-${{ matrix.arch }}
    needs: version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest    # Apple Silicon (M1/M2/M3)
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Ninja
        run: brew install ninja

      - name: Configure
        run: >-
          cmake -S "$SRC_DIR" -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --target ndtool

      - name: Stage archive
        run: |
          set -e
          STAGE="dist/${TOOL_NAME}-macos-${{ matrix.arch }}"
          mkdir -p "$STAGE"
          cp build/ndtool "$STAGE/"
          cp "$SRC_DIR/tools/ndtool/README.md" "$STAGE/" 2>/dev/null || true
          cp README.md LICENSE "$STAGE/" 2>/dev/null || true

      - name: Create tarball
        run: |
          cd dist
          tar czf "${TOOL_NAME}-macos-${{ matrix.arch }}.tar.gz" \
              "${TOOL_NAME}-macos-${{ matrix.arch }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.TOOL_NAME }}-macos-${{ matrix.arch }}
          path: dist/${{ env.TOOL_NAME }}-macos-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  # ── Publish GitHub Release (tag pushes only) ────────────────────────
  publish-release:
    name: Publish GitHub Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist

      - name: List artifacts
        run: find dist -maxdepth 2 -type f \( -name '*.zip' -o -name '*.tar.gz' \) -print

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.zip
            dist/**/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
